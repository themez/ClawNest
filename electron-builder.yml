appId: ai.openclaw.clawnest
productName: ClawNest

directories:
  output: dist
  buildResources: assets

files:
  - out/**/*
  - package.json

asar: true
asarUnpack:
  - "**/*.node"

mac:
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: generic
  url: https://clawnest-releases.xianz.me
