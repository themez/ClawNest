appId: ai.openclaw.clawbox
productName: ClawBox

directories:
  output: dist
  buildResources: assets

files:
  - out/**/*
  - package.json

asar: true
asarUnpack:
  - "**/*.node"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: "<owner>"
  repo: clawbox
